<div class="card" [routerLink]="['/product', project.id]">
  <!-- Preview Image -->
  <div class="card-image">
    <img [src]="project.previewImage" [alt]="project.title" loading="lazy" />
    <div class="card-overlay"></div>
    <span class="card-badge">{{ project.group }}</span>
  </div>

  <!-- Content -->
  <div class="card-body">
    <h3 class="card-title">{{ project.title }}</h3>

    @if (project.description) {
      <p class="card-desc">{{ project.description }}</p>
    }

    <!-- Stack chips -->
    <div class="card-stack">
      @for (tech of visibleStack; track tech) {
        <span class="chip">{{ tech }}</span>
      }
      @if (extraCount > 0) {
        <span class="chip chip-extra">+{{ extraCount }}</span>
      }
    </div>

    <!-- Links -->
    <div class="card-links">
      @if (project.git) {
        <a [href]="project.git" target="_blank" rel="noopener noreferrer" class="card-link" (click)="onLinkClick($event)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
          </svg>
        </a>
      }
      @if (project.href) {
        <a [href]="project.href" target="_blank" rel="noopener noreferrer" class="card-link" (click)="onLinkClick($event)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </a>
      }
      @if (project.boosty) {
        <a [href]="project.boosty" target="_blank" rel="noopener noreferrer" class="card-link card-link-text" (click)="onLinkClick($event)">
          Boosty
        </a>
      }
    </div>
  </div>
</div>
