@if (projectsService.loading()) {
  <div class="loader">
    <div class="spinner"></div>
    <p>Загрузка проектов...</p>
  </div>
} @else if (projectsService.error()) {
  <div class="error">
    <p>{{ projectsService.error() }}</p>
  </div>
} @else {
  @for (group of projectsService.groups(); track group) {
    <app-project-list
      [title]="projectsService.getGroupLabel(group)"
      [subtitle]="'Портфолио'"
      [projects]="projectsService.byGroup()[group]"
    ></app-project-list>
  }
}
